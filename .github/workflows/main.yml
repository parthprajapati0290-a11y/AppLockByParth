name: Build APK

on:
  push:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      
      - name: Unzip project
        run: unzip AppLockByParth_SourceCode.zip
      
      - name: Setup JDK
        uses: actions/setup-java@v3
        with:
          java-version: '17'
          distribution: 'temurin'
      
      - name: Build APK
        working-directory: AppLockByParth
        run: chmod +x gradlew && ./gradlew assembleDebug
      
      - name: Upload APK
        uses: actions/upload-artifact@v3
        with:
          name: AppLock-debug
          path: AppLockByParth/app/build/outputs/apk/debug/app-debug.apk
